<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectra — Data Explorer Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0a0a; --surface: #111113; --surface2: #1a1a1e;
    --border: #2a2a2e; --fg: #e4e4e7; --muted: #71717a;
    --accent: #10b981; --cyan: #06b6d4; --amber: #f59e0b;
    --rose: #f43f5e; --indigo: #818cf8; --purple: #a78bfa;
    --blue: #3b82f6; --green: #22c55e; --orange: #f97316;
    --pink: #ec4899;
  }
  body { background: var(--bg); color: var(--fg); font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
  .header h1 span { color: var(--muted); font-weight: 400; }
  .preset-bar { display: flex; gap: 4px; }
  .preset-btn { padding: 4px 10px; font-size: 11px; font-family: inherit; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; transition: all .15s; border-radius: 4px; }
  .preset-btn:hover { border-color: var(--accent); color: var(--fg); }
  .preset-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 260px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
  .sidebar-section { padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .sidebar-section h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 8px; }

  .layer-toggle { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
  .layer-toggle input { display: none; }
  .layer-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .layer-toggle label { font-size: 12px; color: var(--fg); cursor: pointer; flex: 1; }
  .layer-toggle .count { font-size: 10px; color: var(--muted); }
  .layer-toggle input:not(:checked) ~ label { color: var(--muted); text-decoration: line-through; }

  .conn-toggle { display: flex; align-items: center; gap: 8px; padding: 3px 0; cursor: pointer; }
  .conn-toggle input { display: none; }
  .conn-line { width: 16px; height: 2px; flex-shrink: 0; }
  .conn-toggle label { font-size: 11px; color: var(--fg); cursor: pointer; }
  .conn-toggle input:not(:checked) ~ label { color: var(--muted); text-decoration: line-through; }

  /* Search */
  .search-box { width: 100%; padding: 6px 8px; font-size: 11px; font-family: inherit; background: var(--bg); border: 1px solid var(--border); color: var(--fg); border-radius: 4px; outline: none; }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* Node detail */
  .detail-panel { padding: 12px 14px; }
  .detail-panel h4 { font-size: 13px; color: var(--accent); margin-bottom: 4px; }
  .detail-panel .file { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
  .detail-panel .desc { font-size: 11px; color: var(--fg); line-height: 1.5; margin-bottom: 8px; }
  .detail-fields { font-size: 11px; }
  .detail-fields dt { color: var(--muted); margin-top: 6px; }
  .detail-fields dd { color: var(--fg); padding: 2px 0; }
  .detail-fields dd code { background: var(--surface2); padding: 1px 4px; border-radius: 2px; font-size: 10px; }

  /* Canvas area */
  .canvas-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .canvas-toolbar { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .canvas-toolbar button { padding: 3px 8px; font-size: 11px; font-family: inherit; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; border-radius: 3px; }
  .canvas-toolbar button:hover { color: var(--fg); border-color: var(--accent); }
  .canvas-toolbar .spacer { flex: 1; }
  .canvas-toolbar .info { font-size: 10px; color: var(--muted); }

  .svg-wrap { flex: 1; overflow: hidden; position: relative; }
  svg { width: 100%; height: 100%; }

  /* SVG styles */
  .node-rect { rx: 6; cursor: pointer; stroke-width: 1.5; transition: all .15s; }
  .node-rect:hover { stroke-width: 2.5; filter: brightness(1.15); }
  .node-rect.selected { stroke-width: 2.5; stroke-dasharray: none; }
  .node-label { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 11px; fill: #fff; font-weight: 600; pointer-events: none; }
  .node-sub { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 8px; fill: rgba(255,255,255,.5); pointer-events: none; }
  .conn-path { fill: none; stroke-width: 1.5; }
  .conn-label { font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 8px; fill: var(--muted); }

  /* Prompt area */
  .prompt-area { border-top: 1px solid var(--border); background: var(--surface); padding: 10px 14px; max-height: 180px; overflow-y: auto; flex-shrink: 0; }
  .prompt-area .prompt-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .prompt-area h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .copy-btn { padding: 3px 10px; font-size: 10px; font-family: inherit; border: 1px solid var(--accent); background: transparent; color: var(--accent); cursor: pointer; border-radius: 3px; transition: all .15s; }
  .copy-btn:hover { background: var(--accent); color: #000; }
  .prompt-text { font-size: 11px; color: var(--fg); line-height: 1.6; white-space: pre-wrap; }

  /* Table view */
  .table-view { display: none; flex: 1; overflow: auto; padding: 16px; }
  .table-view.active { display: block; }
  .schema-table { width: 100%; border-collapse: collapse; }
  .schema-table th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); }
  .schema-table td { font-size: 11px; padding: 5px 10px; border-bottom: 1px solid var(--border); color: var(--fg); }
  .schema-table td.type { color: var(--cyan); }
  .schema-table td.pk { color: var(--amber); }
  .schema-table td.fk { color: var(--indigo); }
  .schema-table tr:hover td { background: var(--surface2); }
  .table-title { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .table-desc { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  .table-group { margin-bottom: 24px; }

  /* Tabs */
  .view-tabs { display: flex; gap: 2px; }
  .view-tab { padding: 3px 10px; font-size: 11px; font-family: inherit; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; border-radius: 3px; }
  .view-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>spectra <span>// data explorer</span></h1>
  <div class="preset-bar">
    <button class="preset-btn active" onclick="setPreset('full')">Full System</button>
    <button class="preset-btn" onclick="setPreset('frontend')">Frontend</button>
    <button class="preset-btn" onclick="setPreset('backend')">Backend</button>
    <button class="preset-btn" onclick="setPreset('data')">Data Flow</button>
    <button class="preset-btn" onclick="setPreset('auth')">Auth Flow</button>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <input class="search-box" type="text" placeholder="검색 (노드, 테이블, API...)" oninput="handleSearch(this.value)">
    </div>

    <div class="sidebar-section">
      <h3>Layers</h3>
      <div id="layer-toggles"></div>
    </div>

    <div class="sidebar-section">
      <h3>Connections</h3>
      <div id="conn-toggles"></div>
    </div>

    <div class="sidebar-section" id="detail-section" style="display:none">
      <h3>Detail</h3>
      <div class="detail-panel" id="detail-content"></div>
    </div>
  </div>

  <div class="canvas-area">
    <div class="canvas-toolbar">
      <div class="view-tabs">
        <button class="view-tab active" onclick="setView('diagram')">Architecture</button>
        <button class="view-tab" onclick="setView('schema')">DB Schema</button>
        <button class="view-tab" onclick="setView('api')">API Routes</button>
        <button class="view-tab" onclick="setView('routes')">Page Routes</button>
      </div>
      <div class="spacer"></div>
      <div class="info" id="stats-info"></div>
      <button onclick="zoomIn()">+</button>
      <button onclick="zoomOut()">−</button>
      <button onclick="zoomReset()">Reset</button>
    </div>

    <div class="svg-wrap" id="svg-wrap">
      <svg id="canvas" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#3b82f6"/></marker>
          <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#22c55e"/></marker>
          <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f97316"/></marker>
          <marker id="arrow-rose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f43f5e"/></marker>
          <marker id="arrow-muted" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#71717a"/></marker>
        </defs>
      </svg>
    </div>

    <div class="table-view" id="schema-view"></div>
    <div class="table-view" id="api-view"></div>
    <div class="table-view" id="routes-view"></div>

    <div class="prompt-area">
      <div class="prompt-header">
        <h3>Generated Prompt</h3>
        <button class="copy-btn" onclick="copyPrompt()">Copy</button>
      </div>
      <div class="prompt-text" id="prompt-output"></div>
    </div>
  </div>
</div>

function buildControls() {
  const lDiv = document.getElementById('layer-toggles');
  lDiv.innerHTML = Object.entries(layers).map(([k, v]) => {
    const count = nodes.filter(n => n.layer === k).length;
    return `<div class="layer-toggle" onclick="toggleLayer('${k}')">
      <input type="checkbox" id="l-${k}" ${state.layers[k]?'checked':''}>
      <span class="layer-dot" style="background:${v.color}"></span>
      <label for="l-${k}">${v.label}</label>
      <span class="count">${count}</span>
    </div>`;
  }).join('');

  const cDiv = document.getElementById('conn-toggles');
  cDiv.innerHTML = Object.entries(connTypes).map(([k, v]) => {
    return `<div class="conn-toggle" onclick="toggleConn('${k}')">
      <input type="checkbox" id="c-${k}" ${state.connTypes[k]?'checked':''}>
      <span class="conn-line" style="background:${v.color};${v.dash?`background:repeating-linear-gradient(90deg,${v.color} 0,${v.color} 4px,transparent 4px,transparent 6px)`:``}"></span>
      <label for="c-${k}">${v.label}</label>
    </div>`;
  }).join('');
}

function renderDiagram() {
  const svg = document.getElementById('canvas');
  const wrap = document.getElementById('svg-wrap');
  // Clear
  while (svg.lastChild && svg.lastChild.tagName !== 'defs') svg.removeChild(svg.lastChild);

  const visibleNodes = nodes.filter(n => state.layers[n.layer] && matchSearch(n));
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleConns = connections.filter(c => state.connTypes[c.type] && visibleIds.has(c.from) && visibleIds.has(c.to));

  // Layer bands
  const layerBands = {};
  visibleNodes.forEach(n => {
    if (!layerBands[n.layer]) layerBands[n.layer] = { minY: Infinity, maxY: -Infinity };
    layerBands[n.layer].minY = Math.min(layerBands[n.layer].minY, n.y - 8);
    layerBands[n.layer].maxY = Math.max(layerBands[n.layer].maxY, n.y + n.h + 8);
  });
  Object.entries(layerBands).forEach(([k, band]) => {
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', 20); rect.setAttribute('y', band.minY);
    rect.setAttribute('width', 950); rect.setAttribute('height', band.maxY - band.minY);
    rect.setAttribute('rx', 8); rect.setAttribute('fill', layers[k].fill); rect.setAttribute('opacity', '0.3');
    svg.appendChild(rect);
    const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    txt.setAttribute('x', 30); txt.setAttribute('y', band.minY + 14);
    txt.setAttribute('fill', layers[k].color); txt.setAttribute('font-size', '9'); txt.setAttribute('font-family', 'inherit'); txt.setAttribute('opacity', '0.6');
    txt.textContent = layers[k].label;
    svg.appendChild(txt);
  });

  // Connections
  visibleConns.forEach(c => {
    const from = nodes.find(n => n.id === c.from);
    const to = nodes.find(n => n.id === c.to);
    if (!from || !to) return;
    const x1 = from.x + from.w / 2, y1 = from.y + from.h;
    const x2 = to.x + to.w / 2, y2 = to.y;
    const ct = connTypes[c.type];
    const mid = (y1 + y2) / 2;

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1},${mid} ${x2},${mid} ${x2},${y2}`);
    path.setAttribute('class', 'conn-path');
    path.setAttribute('stroke', ct.color);
    if (ct.dash) path.setAttribute('stroke-dasharray', ct.dash);
    const markerColor = ct.color === '#3b82f6' ? 'blue' : ct.color === '#22c55e' ? 'green' : ct.color === '#f97316' ? 'orange' : ct.color === '#f43f5e' ? 'rose' : 'muted';
    path.setAttribute('marker-end', `url(#arrow-${markerColor})`);
    svg.appendChild(path);

    if (c.label) {
      const lx = (x1 + x2) / 2, ly = mid - 4;
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', lx); t.setAttribute('y', ly);
      t.setAttribute('class', 'conn-label'); t.setAttribute('text-anchor', 'middle');
      t.textContent = c.label;
      svg.appendChild(t);
    }
  });

  // Nodes
  visibleNodes.forEach(n => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.onclick = () => selectNode(n.id);

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', n.x); rect.setAttribute('y', n.y);
    rect.setAttribute('width', n.w); rect.setAttribute('height', n.h);
    rect.setAttribute('class', 'node-rect' + (state.selectedNode === n.id ? ' selected' : ''));
    rect.setAttribute('fill', layers[n.layer].fill);
    rect.setAttribute('stroke', state.selectedNode === n.id ? '#fff' : layers[n.layer].color);
    g.appendChild(rect);

    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', n.x + n.w / 2); label.setAttribute('y', n.y + 18);
    label.setAttribute('class', 'node-label'); label.setAttribute('text-anchor', 'middle');
    label.textContent = n.label;
    g.appendChild(label);

    const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    sub.setAttribute('x', n.x + n.w / 2); sub.setAttribute('y', n.y + 32);
    sub.setAttribute('class', 'node-sub'); sub.setAttribute('text-anchor', 'middle');
    sub.textContent = n.sub;
    g.appendChild(sub);

    svg.appendChild(g);
  });

  svg.setAttribute('viewBox', `${state.panX} ${state.panY} ${980 / state.zoom} ${720 / state.zoom}`);
  document.getElementById('stats-info').textContent = `${visibleNodes.length} nodes · ${visibleConns.length} connections`;
}

function selectNode(id) {
  state.selectedNode = state.selectedNode === id ? null : id;
  renderDiagram();
  renderDetail();
  updatePrompt();
}

function renderDetail() {
  const sec = document.getElementById('detail-section');
  const el = document.getElementById('detail-content');
  if (!state.selectedNode) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  const n = nodes.find(x => x.id === state.selectedNode);
  const incoming = connections.filter(c => c.to === n.id).map(c => ({ ...c, node: nodes.find(x => x.id === c.from) }));
  const outgoing = connections.filter(c => c.from === n.id).map(c => ({ ...c, node: nodes.find(x => x.id === c.to) }));

  el.innerHTML = `
    <h4>${n.label}</h4>
    <div class="file">src/${n.sub}</div>
    <div class="desc">${n.desc}</div>
    <dl class="detail-fields">
      <dt>Layer</dt><dd><code>${layers[n.layer].label}</code></dd>
      ${incoming.length ? `<dt>← Incoming (${incoming.length})</dt>${incoming.map(c => `<dd><code>${c.node?.label||c.from}</code> <span style="color:${connTypes[c.type].color}">${c.label||connTypes[c.type].label}</span></dd>`).join('')}` : ''}
      ${outgoing.length ? `<dt>→ Outgoing (${outgoing.length})</dt>${outgoing.map(c => `<dd><code>${c.node?.label||c.to}</code> <span style="color:${connTypes[c.type].color}">${c.label||connTypes[c.type].label}</span></dd>`).join('')}` : ''}
    </dl>`;
}

function updatePrompt() {
  const el = document.getElementById('prompt-output');
  const visibleLayers = Object.entries(state.layers).filter(([,v])=>v).map(([k])=>layers[k].label);
  const visibleConnsTypes = Object.entries(state.connTypes).filter(([,v])=>v).map(([k])=>connTypes[k].label);

  let parts = [`Spectra tech-blog (Next.js 16 + Supabase) 아키텍처에서`];

  if (visibleLayers.length < Object.keys(layers).length) {
    parts.push(`${visibleLayers.join(', ')} 레이어를 보고 있습니다.`);
  } else {
    parts.push('전체 시스템을 보고 있습니다.');
  }

  if (state.selectedNode) {
    const n = nodes.find(x => x.id === state.selectedNode);
    const incoming = connections.filter(c => c.to === n.id);
    const outgoing = connections.filter(c => c.from === n.id);
    parts.push(`\n\n선택된 컴포넌트: ${n.label} (src/${n.sub})\n${n.desc}`);
    if (incoming.length) parts.push(`\n수신 연결: ${incoming.map(c => nodes.find(x=>x.id===c.from)?.label).join(', ')}`);
    if (outgoing.length) parts.push(`발신 연결: ${outgoing.map(c => nodes.find(x=>x.id===c.to)?.label).join(', ')}`);
  }

  if (state.view === 'schema') {
    parts.push('\n\nDB 스키마: ' + Object.keys(schema).join(', '));
  }

  el.textContent = parts.join(' ');
}

function toggleLayer(k) { state.layers[k] = !state.layers[k]; buildControls(); renderDiagram(); updatePrompt(); }
function toggleConn(k) { state.connTypes[k] = !state.connTypes[k]; buildControls(); renderDiagram(); updatePrompt(); }

function setPreset(name) {
  const p = presets[name];
  state.layers = { ...p.layers };
  state.connTypes = { ...p.conns };
  state.selectedNode = null;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().replace(' ','') === name));
  buildControls(); renderDiagram(); renderDetail(); updatePrompt();
}

function setView(v) {
  state.view = v;
  document.querySelectorAll('.view-tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(v === 'diagram' ? 'arch' : v === 'schema' ? 'db' : v === 'api' ? 'api' : 'page')));
  document.getElementById('svg-wrap').style.display = v === 'diagram' ? '' : 'none';
  document.getElementById('schema-view').classList.toggle('active', v === 'schema');
  document.getElementById('api-view').classList.toggle('active', v === 'api');
  document.getElementById('routes-view').classList.toggle('active', v === 'routes');
  updatePrompt();
}

function matchSearch(n) {
  if (!state.search) return true;
  const q = state.search.toLowerCase();
  return n.label.toLowerCase().includes(q) || n.sub.toLowerCase().includes(q) || n.desc.toLowerCase().includes(q);
}

function handleSearch(val) {
  state.search = val;
  renderDiagram();
}

function zoomIn() { state.zoom = Math.min(state.zoom * 1.2, 3); renderDiagram(); }
function zoomOut() { state.zoom = Math.max(state.zoom / 1.2, 0.5); renderDiagram(); }
function zoomReset() { state.zoom = 1; state.panX = 0; state.panY = 0; renderDiagram(); }

function copyPrompt() {
  const text = document.getElementById('prompt-output').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.querySelector('.copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy', 1500);
}

// Pan
let isPanning = false, startX, startY;
document.getElementById('svg-wrap').addEventListener('mousedown', e => {
  if (e.target.closest('.node-rect')) return;
  isPanning = true; startX = e.clientX; startY = e.clientY;
});
document.addEventListener('mousemove', e => {
  if (!isPanning) return;
  state.panX -= (e.clientX - startX) / state.zoom;
  state.panY -= (e.clientY - startY) / state.zoom;
  startX = e.clientX; startY = e.clientY;
  renderDiagram();
});
document.addEventListener('mouseup', () => isPanning = false);
document.getElementById('svg-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn(); else zoomOut();
}, { passive: false });

// ============================================================
// INIT
// ============================================================

buildControls();
renderDiagram();
renderSchemaView();
renderApiView();
renderRoutesView();
renderDetail();
updatePrompt();
</script>
</body>
</html>
